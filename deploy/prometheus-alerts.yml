# =============================================================================
# Prometheus alerting rules for quantum-price-inference
#
# These rules fire when the API is degraded or down.
# To integrate with Alertmanager, add an alerting: block to prometheus.yml
# and deploy an Alertmanager container.
# =============================================================================

groups:
  - name: qpi-api
    rules:

      # -----------------------------------------------------------------------
      # High error rate — more than 1 % of requests return 5xx over 5 min
      # -----------------------------------------------------------------------
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{job="qpi-api", status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{job="qpi-api"}[5m]))
          ) > 0.01
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "QPI API error rate above 1 %"
          description: >
            {{ $value | humanizePercentage }} of requests to the QPI API
            returned 5xx over the last 5 minutes.

      # -----------------------------------------------------------------------
      # High p95 latency — 95th-percentile request duration exceeds 10 s
      # -----------------------------------------------------------------------
      - alert: HighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(http_request_duration_seconds_bucket{job="qpi-api"}[5m])) by (le)
          ) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "QPI API p95 latency above 10 s"
          description: >
            The 95th-percentile request duration is {{ $value | humanizeDuration }}.
            Consider increasing epsilon on the quantum endpoint or scaling workers.

      # -----------------------------------------------------------------------
      # API down — no successful scrapes for 1 min
      # -----------------------------------------------------------------------
      - alert: ApiDown
        expr: up{job="qpi-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "QPI API is unreachable"
          description: >
            Prometheus cannot scrape the QPI API at {{ $labels.instance }}.
            The container may have crashed or the port is not reachable.

      # -----------------------------------------------------------------------
      # Quantum endpoint idle — oracle call rate drops to 0 for 10 min
      # (fires only when the endpoint has been used at least once)
      # -----------------------------------------------------------------------
      - alert: QuantumEndpointIdle
        expr: |
          (
            sum(quantum_oracle_calls_total{job="qpi-api"}) > 0
          )
          and
          (
            rate(quantum_oracle_calls_total{job="qpi-api"}[10m]) == 0
          )
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "Quantum endpoint has received no requests for 10 min"
          description: >
            The quantum estimation endpoint has been idle for 10 minutes.
            This may be expected outside workshop hours.
